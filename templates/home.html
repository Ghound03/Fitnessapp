{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}

<div class="card">
    <h1>Welcome to FitTrack Pro</h1>

    <p>
        Track workouts, monitor calories burned,
        and view your fitness progress over time.
    </p>

    {% if not current_user.is_authenticated %}
        <p>
            <a class="btn" href="{{ url_for('register') }}">
                Get Started
            </a>
        </p>
    {% endif %}
</div>

{% endblock %}
